{% extends "base.html" %}

{% block title %}Ошибка {{ error_code }}{% endblock %}

{% block content %}
<section class="container my-5 px-4">
  <div class="row">
    <div class="col-sm">
    </div>
    <div class="col-sm">
      <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading text-center">Ошибка {{ error_code }}</h4>
        <p class="text-center">{{ error_message }}</p>
        <hr>
        <p class="text-center">
          <a href="{{ url_for('index_view') }}" class="btn btn-primary">Вернуться на главную</a>
        </p>
      </div>
    </div>
    <div class="col-sm">
    </div>
  </div>
</section>
{% endblock %}
